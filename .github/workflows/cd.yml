on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: 'write'
  contents: 'read'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: 'actions/checkout@v4'

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/173068036486/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'cloud-run-deployer@project-684625c7-55f6-4de6-bf7.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build Go binary'
        run: ./scripts/buildprod.sh

      - name: 'Deploy'
        run: |
          gcloud builds submit --tag us-central1-docker.pkg.dev/project-684625c7-55f6-4de6-bf7/notely-ar-repo/notely:latest .

      - name: 'Install goose'
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: 'Normalize DATABASE_URL'
        run: |
          database_url="$DATABASE_URL"
          database_url="${database_url#\"}"
          database_url="${database_url%\"}"
          echo "DATABASE_URL=$database_url" >> "$GITHUB_ENV"
      
      - name: 'Run migrations'
        run: ./scripts/migrateup.sh
      
      - name: 'Deploy to Cloud Run'
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/project-684625c7-55f6-4de6-bf7/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project project-684625c7-55f6-4de6-bf7 --max-instances=4
