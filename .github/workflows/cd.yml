on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: 'write'
  contents: 'read'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: 'actions/checkout@v4'

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/173068036486/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'cloud-run-deployer@project-684625c7-55f6-4de6-bf7.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build Go binary'
        run: ./scripts/buildprod.sh

      - name: 'Push'
        run: |
          gcloud builds submit --tag us-central1-docker.pkg.dev/project-684625c7-55f6-4de6-bf7/notely-ar-repo/notely:latest .